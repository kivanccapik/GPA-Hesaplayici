<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas GPA Hesaplayıcı</title>
    <link rel="shortcut icon" href="favicon2.png" type="image/x-icon">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

  </head>
  <body>
    <div class="bg"></div>

    <div
      class="min-vh-100 d-flex flex-column justify-content-center align-items-center"
    >
      <div class="genel-kart">
        <form action="" id="form-1">
          <h1>GPA Hesaplayıcı</h1>

          <div class="ders-adi mb-3 gap-2 col-12 d-flex flex-column">
            <label for="">Ders Adı:</label>
            <input
              id="ders-adi"
              type="text"
              class="form-control"
              placeholder="Örn:Programming"
              required
            />
          </div>

          <div class="row mb-3">
            <div class="kredi-sayisi col-6 gap-2 d-flex flex-column">
              <label for="kredi-sayisi">Kredi Sayısı:</label>
              <input
                id="kredi-sayisi"
                class="form-control"
                type="number"
                min="0"
                placeholder="0"
                required
              />
            </div>

            <div class="harf-notu col-6 gap-2 d-flex flex-column">
              <label for="harf-notu">Harf Notu:</label>
              <select id="harf-notu" class="form-select" required>
                <option value="A+">A+</option>
                <option value="A">A</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B">B</option>
                <option value="B-">B-</option>
                <option value="C+">C+</option>
                <option value="C">C</option>
                <option value="C-">C-</option>
                <option value="D+">D+</option>
                <option value="D">D</option>
                <option value="F">F</option>
              </select>
            </div>
          </div>

          



          <div class="listeye-ekle fs-5 m-4" id="listeye-ekle">
            <button type="button" class="w-100" >Listeye Ekle</button>
          </div>

          <div class="row mb-3">
            <div class="kredi-sayisi col-6 gap-2 d-flex flex-column" >
              <label for="kredi-sayisi">Mevcut Not Ortalaması:</label>
              <input
                id="mevcut-ortalama"
                class="form-control"
                type="number"
                placeholder="0"
              />
            </div>

            <div class="kredi-sayisi col-6 gap-2 d-flex flex-column">
              <label for="kredi-sayisi">Mevcut Alınan Kredi:</label>
              <input
                id="mevcut-kredi"
                class="form-control"
                type="number"
                placeholder="0"
              />
            </div>
          </div>  

        </form>



        <div class="tablo col-12 d-flex flex-column">
          <table>
            <tbody id="ders-tablosu-body">

            </tbody>
          </table>
        </div>
        <div class="row m-4">
          <div class="hesapla fs-4 col-6 w-50 d-flex flex-column" id="hesaplama-butonu">
            <button type="submit">Hesapla</button>
          </div>
          <div class="temizle fs-4 col-6 w-50 d-flex flex-column">
            <button type="reset" id="temizle-butonu">Temizle</button>
          </div>
        </div>

        <div class="sonuc-ekrani col-12 d-flex flex-column" id="sonuc">
          
        </div>

        </div>
      </div>
    </div>

    <script src="app.js"></script>

  </body>
</html>
